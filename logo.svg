<svg viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Terminal icon box -->
  <rect x="10" y="8" width="80" height="80" rx="16" ry="16"
        stroke="#3DF59A" stroke-width="6.5" fill="none"/>
  <!-- > chevron -->
  <polyline points="27,33 55,48 27,63"
            stroke="#3DF59A" stroke-width="6.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- _ underscore -->
  <line x1="55" y1="65" x2="76" y2="65"
        stroke="#3DF59A" stroke-width="6.5" stroke-linecap="round"/>

  <!-- "zdevs" — large white, beside icon -->
  <text x="106" y="70"
        font-family="Inter, ui-sans-serif, sans-serif"
        font-weight="700"
        font-size="70"
        letter-spacing="-2"
        fill="#ffffff">zdevs</text>

  <!-- Divider -->
  <line x1="10" y1="98" x2="390" y2="98"
        stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- "BUILD. AUTOMATE. GROW." — single line, white -->
  <text x="10" y="122"
        font-family="Inter, ui-sans-serif, sans-serif"
        font-weight="400"
        font-size="19"
        letter-spacing="2"
        fill="#ffffff">BUILD. AUTOMATE. GROW.</text>

</svg>
